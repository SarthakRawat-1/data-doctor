version: "3.9"

# This extends the main docker-compose.yml to add a sample MySQL database
# Usage: docker compose -f docker-compose.yml -f docker-compose.sample-db.yml up -d

services:
  sample_mysql:
    container_name: sample_mysql_db
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sample_root_pass
      MYSQL_DATABASE: ecommerce_sample
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_pass
    ports:
      - "3307:3306"  # Use 3307 to avoid conflict with OpenMetadata's MySQL on 3306
    volumes:
      - ./sample-data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - sample-mysql-data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sample_user", "-psample_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sample-mysql-data:

networks:
  app_net:
    external: true
    name: openmetadata_app_net
