version: "3.9"

# E-commerce dataset with all 8 scenarios
# Usage: docker compose -f docker-compose.yml -f docker-compose.ecommerce-scenarios.yml up -d

services:
  ecommerce_clean:
    container_name: ecommerce_clean
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sample_root_pass
      MYSQL_DATABASE: ecommerce_clean
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_pass
    ports:
      - "3310:3306"
    volumes:
      - ./sample-data/ecommerce-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ecommerce_clean_data:/var/lib/mysql
    networks:
      - app_net

  ecommerce_schema_change:
