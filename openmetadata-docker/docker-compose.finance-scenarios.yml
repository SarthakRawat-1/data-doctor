version: "3.9"

# Finance dataset with all 8 scenarios
# Usage: docker compose -f docker-compose.yml -f docker-compose.finance-scenarios.yml up -d

services:
  finance_clean:
    container_name: finance_clean
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sample_root_pass
      MYSQL_DATABASE: finance_clean
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_pass
    ports:
      - "3330:3306"
    volumes:
      - ./sample-data/finance-init.sql:/docker-entrypoint-initdb.d/init.sql
      - finance_clean_data:/var/lib/mysql
    networks:
      - app_net

  finance_schema_change:
