version: "3.9"

# Healthcare dataset with all 8 scenarios
# Usage: docker compose -f docker-compose.yml -f docker-compose.healthcare-scenarios.yml up -d

services:
  healthcare_clean:
    container_name: healthcare_clean
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sample_root_pass
      MYSQL_DATABASE: healthcare_clean
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_pass
    ports:
      - "3320:3306"
    volumes:
      - ./sample-data/healthcare-init.sql:/docker-entrypoint-initdb.d/init.sql
      - healthcare_clean_data:/var/lib/mysql
    networks:
      - app_net

  healthcare_schema_change:
